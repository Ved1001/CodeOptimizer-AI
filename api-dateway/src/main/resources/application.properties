server.port=3333
spring.application.name=api-gateway

spring.cloud.compatibility-verifier.enabled=false

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

# Register correctly on Render
eureka.instance.hostname=${RENDER_EXTERNAL_HOSTNAME:api-gateway.onrender.com}
eureka.instance.secure-port-enabled=true
eureka.instance.non-secure-port-enabled=false
eureka.instance.instance-id=${spring.application.name}:${random.uuid}

# Route 1 - Routing Engine
spring.cloud.gateway.server.webflux.routes[0].id=routing-service-route
spring.cloud.gateway.server.webflux.routes[0].uri=https://routing-engine-k7di.onrender.com
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/route/**

# Route 2 - Auth Service
spring.cloud.gateway.server.webflux.routes[1].id=auth-service-route
spring.cloud.gateway.server.webflux.routes[1].uri=https://codeoptimizer-ai.onrender.com/
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/auth/**