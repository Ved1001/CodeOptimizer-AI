server.port=3333
spring.application.name=api-gateway

# Bypass the version check
spring.cloud.compatibility-verifier.enabled=false

# Connect to Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ?? UPDATED SPRING BOOT 3.5+ GATEWAY ROUTING RULES
# Route 1: Forward to routing-engine
spring.cloud.gateway.server.webflux.routes[0].id=routing-service-route
spring.cloud.gateway.server.webflux.routes[0].uri=lb://routing-engine
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/route/**

# Route 2: Forward to budget-service
spring.cloud.gateway.server.webflux.routes[1].id=budget-service-route
spring.cloud.gateway.server.webflux.routes[1].uri=lb://budget-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/budget/**