<!DOCTYPE html>
<html lang="en" style="background-color: #0C1017;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="View and update your CostReducer AI account profile settings and security passwords.">
    <title>Account Settings - CostReducer AI</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <!-- Theme Toggle Flash Prevention -->
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'dark';
            if (theme === 'light') {
                document.documentElement.classList.add('light-theme');
                document.documentElement.style.backgroundColor = '#f8fafc';
            } else {
                document.documentElement.style.backgroundColor = '#0C1017';
            }
        })();
    </script>
    
    <!-- CSS Custom Properties & Core Styles -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-primary text-primary">

    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside id="sidebar" class="sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content" style="position: relative;">
            <!-- Page Header -->
            <header id="page-header" class="page-header"></header>

            <!-- Solid White Loading Screen -->
            <div id="page-skeleton" class="skeleton-overlay"></div>

            <!-- Content Wrapper for fade-in effect -->
            <div id="main-content-wrapper" style="opacity: 0; transition: opacity 0.4s ease;">
                <div class="content-grid cols-3">
                <!-- Column 1: Profile Display Card -->
                <div class="card" style="text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 320px;">
                    <div class="avatar xl" id="profAvatar" style="margin-bottom: var(--space-4);">U</div>
                    <h2 id="profName" style="font-size: var(--text-xl); font-weight: var(--font-bold); margin-bottom: var(--space-1); color: var(--text-primary);">-</h2>
                    <p id="profEmail" style="color: var(--text-secondary); font-size: var(--text-sm); margin-bottom: var(--space-3);">-</p>
                    
                    <div style="margin-bottom: var(--space-4);">
                        <span id="profRoleBadge" class="badge">USER</span>
                    </div>

                    <div style="font-size: var(--text-xs); color: var(--text-muted); border-top: 1px solid var(--border); padding-top: var(--space-4); width: 100%;">
                        Member since: <span id="profMemberSince" style="font-weight: var(--font-semibold); color: var(--text-secondary);">-</span>
                    </div>
                </div>

                <!-- Column 2: Edit Profile Details Form -->
                <div class="card" style="grid-column: span 2;">
                    <div class="card-header">
                        <h3 class="card-title"><i class="fas fa-user-edit" style="color: var(--primary-light); margin-right: var(--space-2);"></i> Account Details</h3>
                    </div>
                    <div class="card-body">
                        <form id="editProfileForm" novalidate>
                            <!-- Name input -->
                            <div class="form-group">
                                <label for="name" class="form-label">Full Name</label>
                                <div class="form-input-wrapper">
                                    <i class="fas fa-user input-icon"></i>
                                    <input type="text" id="name" class="form-input" placeholder="Your name" required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary" style="margin-top: var(--space-2);">
                                Save Changes
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Change Password Form (Spans full width for grid alignments) -->
                <div class="card" style="grid-column: span 3; margin-top: var(--space-2);">
                    <div class="card-header">
                        <h3 class="card-title"><i class="fas fa-shield-alt" style="color: var(--warning-light); margin-right: var(--space-2);"></i> Change Password</h3>
                    </div>
                    <div class="card-body">
                        <form id="changePasswordForm" class="route-form" novalidate style="max-width: 600px;">
                            <!-- Email Verification OTP Code -->
                            <div class="form-group">
                                <label for="verificationCode" class="form-label">Email Verification OTP Code</label>
                                <div style="display: flex; gap: var(--space-2);">
                                    <div class="form-input-wrapper" style="flex-grow: 1;">
                                        <i class="fas fa-shield-alt input-icon"></i>
                                        <input type="text" id="verificationCode" class="form-input" placeholder="Enter 6-digit code" required autocomplete="off" maxlength="6">
                                    </div>
                                    <button type="button" id="requestOtpBtn" class="btn btn-secondary" style="white-space: nowrap; height: 46px; min-height: 46px;">
                                        Request OTP Code
                                    </button>
                                </div>
                            </div>

                            <!-- New Password -->
                            <div class="form-group">
                                <label for="newPassword" class="form-label">New Password</label>
                                <div class="form-input-wrapper">
                                    <i class="fas fa-lock input-icon"></i>
                                    <input type="password" id="newPassword" class="form-input" placeholder="New password (min 6 characters)" required autocomplete="new-password">
                                </div>
                            </div>

                            <!-- Confirm New Password -->
                            <div class="form-group">
                                <label for="confirmNewPassword" class="form-label">Confirm New Password</label>
                                <div class="form-input-wrapper">
                                    <i class="fas fa-lock-open input-icon"></i>
                                    <input type="password" id="confirmNewPassword" class="form-input" placeholder="Confirm new password" required autocomplete="new-password">
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary" style="margin-top: var(--space-2);">
                                Change Password
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/guard.js"></script>
    <script src="js/components.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
