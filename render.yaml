services:
  - type: web
    name: auth-service
    runtime: docker
    context: ./auth-service        # Docker builds FROM this folder
    dockerfilePath: ./auth-service/Dockerfile
    plan: free
    envVars:
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DATABASE
        sync: false
      - key: MYSQL_PORT
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false

  - type: web
    name: api-gateway
    runtime: docker
    context: ./api-dateway          # ← fix typo to match actual folder name
    dockerfilePath: ./api-dateway/Dockerfile   # ← same here
    plan: free
