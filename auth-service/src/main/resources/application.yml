server:
  port: 8080

spring:
  application:
    name: auth-service

  # ===== MySQL Config (for future production deployment) =====
  # datasource:
  #   url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:auth_db}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
  #   username: ${MYSQL_USER:root}
  #   password: ${MYSQL_PASSWORD}
  #   driver-class-name: com.mysql.cj.jdbc.Driver

  # ===== H2 Config (for Render deployment/demo) =====
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/auth_db}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}

  h2:
    console:
      enabled: true

  jpa:
    properties:
      hibernate:
        # dialect: org.hibernate.dialect.MySQLDialect
        dialect: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${GMAIL_USER:vedshrimali2006@gmail.com}
    password: ${GMAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 3000
          timeout: 3000
          writetimeout: 3000

jwt:
  secret: ${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIGp3dCB0b2tlbiBnZW5lcmF0aW9u}
  expiration: ${JWT_EXPIRATION:86400000}