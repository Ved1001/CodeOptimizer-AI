server:
  port: 8081

spring:
  application:
    name: routing-engine
  cloud:
    compatibility-verifier:
      enabled: false
  main:
    web-application-type: reactive

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    fetch-registry: true
    register-with-eureka: true

  instance:
    hostname: ${RENDER_EXTERNAL_HOSTNAME:routing-engine.onrender.com}
    secure-port-enabled: true
    non-secure-port-enabled: false
    instance-id: ${spring.application.name}:${RENDER_EXTERNAL_HOSTNAME:routing-engine.onrender.com}

llmesh:
  budget-service:
    enabled: ${BUDGET_SERVICE_ENABLED:false}
    base-url: ${BUDGET_SERVICE_URL:http://localhost:9091}
  groq:
    base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1}
    api-key: ${GROQ_API_KEY}

logging:
  level:
    com.llmesh: DEBUG
    org.springframework.web.reactive: INFO
    reactor.netty: WARN
